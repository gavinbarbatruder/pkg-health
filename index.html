<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Package Health</title>
  <link rel="stylesheet" href="src/style.css" />
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg" />
</head>
<body>
  <div class="layout">
    <header>
      <div class="header-inner">
        <div class="brand">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.45"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5" fill="currentColor" opacity="0.9"/>
          </svg>
          Package Health
        </div>
        <a href="https://github.com/gavinbarbatruder/pkg-health" target="_blank" rel="noopener" class="gh-link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          GitHub
        </a>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>Is your dependency healthy?</h1>
        <p>Live data from npm, PyPI, Cargo, Packagist, RubyGems, and NuGet. No API key. No guessing.</p>
        <div class="search-block">
          <div class="eco-row">
            <button class="eco-btn active" data-eco="npm">npm</button>
            <button class="eco-btn" data-eco="pypi">PyPI</button>
            <button class="eco-btn" data-eco="cargo">Cargo</button>
            <button class="eco-btn" data-eco="composer">Composer</button>
            <button class="eco-btn" data-eco="rubygems">RubyGems</button>
            <button class="eco-btn" data-eco="nuget">NuGet</button>
          </div>
          <div class="search-row">
            <textarea id="pkg-input" placeholder="lodash&#10;express&#10;react" rows="3" spellcheck="false"></textarea>
            <button id="check-btn" onclick="runCheck()">
              <span id="btn-label">Check</span>
              <svg id="btn-spin" class="spin hidden" width="14" height="14" viewBox="0 0 14 14" fill="none">
                <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="2" stroke-dasharray="24" stroke-dashoffset="8"/>
              </svg>
            </button>
          </div>
          <p class="batch-hint">One package per line for batch checking</p>
        </div>
      </section>
      <section id="result" aria-live="polite">
        <p class="empty">Enter a package name to check its health</p>
      </section>
    </main>

    <footer>
      <p>Live data from public registries. Open source on <a href="https://github.com/gavinbarbatruder/pkg-health" target="_blank" rel="noopener">GitHub</a>.</p>
    </footer>
  </div>

  <template id="card-tpl">
    <article class="card">
      <div class="card-top">
        <div class="pkg-info">
          <h2 id="r-name"></h2>
          <div class="tags">
            <span class="tag mono" id="r-version"></span>
            <span class="tag blue" id="r-eco"></span>
            <span class="tag green" id="r-license"></span>
          </div>
        </div>
        <div class="score-wrap">
          <div class="score-num" id="r-score"></div>
          <div class="score-lbl">health</div>
          <div class="bar"><div id="r-bar"></div></div>
        </div>
      </div>
      <div class="metrics" id="r-metrics"></div>
      <hr />
      <div class="findings" id="r-findings"></div>
      <div id="r-links"></div>
    </article>
  </template>

  <script src="src/fetch.js"></script>
  <script src="src/score.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
